<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>해바라기 키우기</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="game-root">
    <header id="hud">
      <span id="hud-points">포인트: 0</span>
      <span id="hud-combo"></span>
      <span id="hud-mission"></span>
      <span id="hud-stage">단계: 씨앗</span>
      <button id="hud-sound-btn" title="Sound">🔊</button>
      <button id="hud-lang-btn" title="Language">🌐</button>
    </header>
    <main id="field"></main>
    <div id="danger-overlay"></div>
    <div id="event-tint"></div>
    <div id="flash-overlay"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
